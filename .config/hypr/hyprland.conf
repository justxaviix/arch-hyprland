################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor = HDMI-A-4, 1600x900@60, 1366x0, 1
monitor = DVI-D-1, 1366x768@60, 0x0, 1

###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = thunar
$menu        = rofi -show drun

#################
### AUTOSTART ###
#################

exec-once = systemctl --user start hyprpolkitagent
exec-once = awww-daemon
exec-once = waybar
exec-once = ~/.config/hypr/scripts/cache-wallpaper-thumbs.sh
exec-once = swaync
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = systemctl --user start xdg-desktop-portal

# Set initial wallpaper — edit path to your wallpaper
exec-once = ~/.config/hypr/scripts/set-wallpaper.sh ~/Pictures/Wallpapers/wmremove-transformed.png

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

env = MOZ_DISABLE_RDD_SANDBOX,1
env = EGL_PLATFORM,wayland

# Force dark mode for GTK and Qt apps
env = GTK_THEME,Adwaita:dark
env = QT_STYLE_OVERRIDE,adwaita-dark
env = QT_QPA_PLATFORMTHEME,gnome
env = XCURSOR_THEME,Adwaita

cursor {
    no_hardware_cursors = true
}

###########
### COLORS (Matugen — regenerated when you run set-wallpaper.sh)
###########

source = ~/.config/hypr/colors.conf

#####################
### LOOK AND FEEL ###
#####################

source = ~/.config/hypr/configs/looknfeel.conf

##################
### ANIMATIONS ###
##################

source = ~/.config/hypr/configs/userAnimations.conf

##################################
### WINDOWRULES AND LAYERRULES ###
##################################

source = ~/.config/hypr/configs/windowrules.conf
source = ~/.config/hypr/configs/workspaces.conf

#############
### LAYOUT ###
#############

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############

source = ~/.config/hypr/configs/input.conf

###################
### KEYBINDINGS ###
###################

source = ~/.config/hypr/configs/keybinds.conf
