# hyprlock.conf — based on binnewbs/arch-hyprland
# Colors come from Matugen: source = colors.conf
source = ~/.config/hypr/colors.conf

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = ~/.config/hypr/current_wallpaper   # symlink kept up to date by set-wallpaper.sh
    color = rgb(000000)

    blur_size = 3
    blur_passes = 2
    noise = 0.0117
    contrast = 1.3
    brightness = 0.6
    vibrancy = 0.21
    vibrancy_darkness = 0.0
}

# ── Clock: Hours ──────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $on_secondary_container
    font_size = 112
    font_family = Adwaita Sans
    shadow_passes = 0
    position = 0, 220
    halign = center
    valign = center
}

# ── Clock: Minutes ────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $on_secondary_container
    font_size = 112
    font_family = Adwaita Sans
    shadow_passes = 0
    position = 0, 80
    halign = center
    valign = center
}

# ── Day of week ───────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "<b> $(date +'%A') </b>"
    color = $secondary
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -15
    halign = center
    valign = center
}

# ── Date ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "<b> $(date +'%d %b %Y') </b>"
    color = $secondary
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# ── Password input ────────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1
    rounding = 22
    outer_color = $source_color
    inner_color = rgba(ffffff1a)
    font_color = $secondary
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, 120
    halign = center
    valign = bottom
}
