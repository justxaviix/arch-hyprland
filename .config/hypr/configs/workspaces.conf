##############################
### WORKSPACE MONITOR RULES ###
##############################
# DVI-D-1  = left monitor  → workspaces 1–5
# HDMI-A-4 = main monitor  → workspaces 6–10

workspace = 1,  monitor:DVI-D-1,  default:true, persistent:true
workspace = 2,  monitor:DVI-D-1,  persistent:true
workspace = 3,  monitor:DVI-D-1,  persistent:true
workspace = 4,  monitor:DVI-D-1,  persistent:true
workspace = 5,  monitor:DVI-D-1,  persistent:true

workspace = 6,  monitor:HDMI-A-4, default:true, persistent:true
workspace = 7,  monitor:HDMI-A-4, persistent:true
workspace = 8,  monitor:HDMI-A-4, persistent:true
workspace = 9,  monitor:HDMI-A-4, persistent:true
workspace = 10, monitor:HDMI-A-4, persistent:true
