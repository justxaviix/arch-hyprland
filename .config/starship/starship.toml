"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](bold cyan)$os$username$hostname$directory$git_branch$git_status
[╰─](bold cyan)$character"""

add_newline = true

[os]
disabled = false
style = "bold cyan"

[os.symbols]
Arch = " "

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style) "

[hostname]
ssh_only = false
style = "bold blue"
format = "[@$hostname]($style) "

[directory]
style = "bold purple"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold green"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "[$all_status$ahead_behind]($style) "
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "󰏗 "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "[ $duration]($style) "

[package]
disabled = true
